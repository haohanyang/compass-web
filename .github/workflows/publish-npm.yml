name: Publish compass-web to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version to publish (defaults to version in package.json)"
        required: false
        default: ""
        type: string

jobs:
  publish-npm:
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event.inputs.version != '' }}
        with:
          ref: "v${{ github.event.inputs.version }}"
          submodules: true
      - uses: actions/checkout@v4
        if: ${{ github.event.inputs.version == '' }}
        with:
          submodules: true
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.12.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Detect channel from version
        id: check-version
        run: |
          version=$(node -e "console.log(require('./package.json').version);")

          if [[ "$version" == *"-alpha"* ]]; then
            channel="alpha"
          elif [[ "$version" == *"-beta"* ]]; then
            channel="beta"
          elif [[ "$version" == *"-rc"* ]]; then
            channel="rc"
          else
            channel="latest"
          fi

          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "channel=${channel}" >> $GITHUB_OUTPUT
          echo "Detected version=${version}, channel=${channel}"
      - name: Bootstrap
        run: bash bootstrap.sh
      - run: pnpm i --frozen-lockfile
      - name: Build compass-web
        run: |
          pnpm run build-client:production
          pnpm run build-server:production
      - name: Publish to npmjs
        env:
          NPM_CONFIG_PROVENANCE: true
        run: pnpm publish --tag ${{ steps.check-version.outputs.channel }} --access public
